  test-clubelo:
    name: test-clubelo
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - version: "3.12"
            toxenv: "py312"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}
      - name: Install tox and uv
        run: pip install tox uv
      - name: Run tox test env
        run: tox -r -e test-clubelo -- --basepython ${{ matrix.python.toxenv }}
      - name: View folder contents after test
        if: always()
        run: ls -la
      - name: Rename coverage artifact
        if: always()
        run: mv .coverage .coverage_clubelo
      - name: View folder contents after rename
        if: always()
        run: ls -la
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clubelo-coverage
          path: ./.coverage_clubelo
