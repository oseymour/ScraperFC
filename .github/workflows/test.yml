  upload-coverage-to-deepsource:
    name: upload-coverage-to-deepsource
    needs: [test-capology, test-clubelo, test-fbref, test-sofascore, test-transfermarkt, test-understat]
    runs-on: ubuntu-latest
    steps:
      - name: download deepsource CLI
        run: curl https://deepsource.io/cli | sh
      - name: set DEEPSOURCE_DSN env var
        run: export DEEPSOURCE_DSN=https://sampledsn@deepsource.io
      - name: download capology coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: capology-coverage-file
          path: capology-coverage.xml
      - name: upload capology artifact
        run: ./bin/deepsource report --analyzer test-coverage --key python --value-file ./capology-coverage.xml
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: pip install tox
      - name: Rox tox env to build docs
        run: tox -r -e docs
